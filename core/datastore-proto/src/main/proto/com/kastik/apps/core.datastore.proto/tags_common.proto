syntax = "proto3";
option java_package = "com.kastik.apps.core.datastore.proto";
option java_multiple_files = true;
package com.kastik.apps.core.datastore.proto;

import "google/protobuf/timestamp.proto";

message TagProto {
  int32 id = 1;
  string title = 2;
  optional int32 parent_id = 3;
  bool is_public = 4;
  string mail_list_name = 5;
  repeated TagProto sub_tags = 6; // Recursive definition

  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  google.protobuf.Timestamp deleted_at = 9;
}
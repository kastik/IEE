syntax = "proto3";
option java_package = "com.kastik.apps.core.datastore.proto";
option java_multiple_files = true;
package com.kastik.apps.core.datastore.proto;

import "google/protobuf/timestamp.proto";

message ProfileProto{
  int32 id = 1;
  string uid = 2;
  string name = 3;
  string email = 4;

  bool isAdmin = 5;
  bool isAuthor = 6;

  google.protobuf.Timestamp createdAt = 7;
  google.protobuf.Timestamp updatedAt = 8;
  google.protobuf.Timestamp deletedAt = 9;
  google.protobuf.Timestamp lastLoginAt = 10;
}
syntax = "proto3";
option java_package = "com.kastik.apps.core.datastore.proto";
option java_multiple_files = true;
package com.kastik.apps.core.datastore.proto;

import "google/protobuf/timestamp.proto";

message ProfileProto{
  int32 id = 1;
  string name = 2;
  string email = 3;
  string createdAt_string = 4 [deprecated = true];
  string updatedAt_string = 5 [deprecated = true];
  bool isAuthor = 6;
  bool isAdmin = 7;
  string lastLoginAt_string = 8 [deprecated = true];
  string uid = 9;
  optional string deletedAt_string = 10 [deprecated = true];
  reserved "subscriptions";
  reserved 11;
  google.protobuf.Timestamp createdAt_timestamp = 12;
  google.protobuf.Timestamp updatedAt_timestamp = 13;
  google.protobuf.Timestamp deletedAt_timestamp = 14;
  google.protobuf.Timestamp lastLoginAt_timestamp = 15;
}
syntax = "proto3";
package com.kastik.apps.core.datastore.proto;

option java_multiple_files = true;
option java_package = "com.kastik.apps.core.datastore.proto";

message OnboardStageProto {
  bool has_finished_onboard = 1;
  StageProto currentStage = 2;
}

enum StageProto {
  Welcome = 0;
  SignIn = 1;
  Notifications = 2;
  Appearance = 3;
  Preferences = 4;
  Finish = 5;
}

name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :core:data:testProductionDebugUnitTest :core:database:testDebugUnitTest :core:network:testProductionDebugUnitTest

  screenshot-tests:
    name: Screenshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Screenshot Tests
        run: ./gradlew :feature:auth:validateDebugScreenshotTest :feature:onboard:validateDebugScreenshotTest :feature:licenses:validateDebugScreenshotTest :feature:profile:validateDebugScreenshotTest :feature:settings:validateDebugScreenshotTest :feature:announcement:validateDebugScreenshotTest :feature:home:validateDebugScreenshotTest :feature:search:validateDebugScreenshotTest

  generate-profiles:
    name: Generate Baseline & Startup Profile
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Cache AVD and System Images
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: gmd-avd-${{ runner.os }}

      - name: Run Tests on Gradle Managed Devices
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:generateBaselineProfile

      - name: Upload Baseline Profiles
        uses: actions/upload-artifact@v4
        with:
          name: profiles
          path: app/src/**/generated/baselineProfiles/**

  publish-github-release:
    needs: [ unit-tests, screenshot-tests, generate-profiles ]
    if: github.event_name == 'push'
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Baseline Profiles
        uses: actions/download-artifact@v4
        with:
          name: profiles

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleProductionRelease

      - name: Upload Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/production/release/output-metadata.json)
          
          gh release create "v$APP_VERSION" \
            app/build/outputs/apk/production/release/*.apk \
            --generate-notes

  publish-playstore-beta:
    needs: [ unit-tests, screenshot-tests, generate-profiles ]
    if: github.event_name == 'push'
    name: Publish PlayStore Beta
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Baseline Profiles
        uses: actions/download-artifact@v4
        with:
          name: profiles

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleProductionRelease

      - name: Upload AAB
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.kastik.apps
          releaseFiles: app/build/outputs/bundle/productionRelease/*.aab
          tracks: beta
          status: completed
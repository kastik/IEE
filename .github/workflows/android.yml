name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :core:data:testProductionDebugUnitTest :core:database:testDebugUnitTest :core:network:testProductionDebugUnitTest

  screenshot-tests:
    name: Screenshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Screenshot Tests
        run: ./gradlew :feature:auth:validateDebugScreenshotTest :feature:onboard:validateDebugScreenshotTest :feature:licenses:validateDebugScreenshotTest :feature:profile:validateDebugScreenshotTest :feature:settings:validateDebugScreenshotTest :feature:announcement:validateDebugScreenshotTest :feature:home:validateDebugScreenshotTest :feature:search:validateDebugScreenshotTest

  generate-profiles:
    needs: [ unit-tests, screenshot-tests ]
    if: github.event_name == 'push'
    name: Generate Profile
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Cache AVD and System Images
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
            /usr/local/lib/android/sdk/emulator
            /usr/local/lib/android/sdk/cmdline-tools
          key: gmd-avd-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle/libs.versions.toml') }}

      - name: Generate Baseline & Startup Profiles
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:generateBaselineProfile

      - name: Upload Baseline Profiles
        uses: actions/upload-artifact@v4
        with:
          name: profiles
          path: app/src/**/generated/baselineProfiles/**

  publish-github-release:
    needs: [ generate-profiles ]
    if: github.event_name == 'push'
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Baseline Profiles
        uses: actions/download-artifact@v4
        with:
          name: profiles

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleProductionRelease

      - name: Upload Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/production/release/output-metadata.json)
          
          gh release create "v$APP_VERSION" \
            app/build/outputs/apk/production/release/*.apk \
            --generate-notes

  publish-playstore-beta:
    needs: [ generate-profiles ]
    if: github.event_name == 'push'
    name: Publish PlayStore Beta
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Baseline Profiles
        uses: actions/download-artifact@v4
        with:
          name: profiles

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Google Services
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_FILE }}
        run: echo "$GOOGLE_JSON" > app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_FILE }}
        run: echo $ENCODED_STRING | base64 -d > app/release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleProductionRelease

      - name: Upload AAB
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.kastik.apps
          releaseFiles: app/build/outputs/bundle/productionRelease/*.aab
          tracks: beta
          status: completed

  bump:
    needs: [ publish-github-release, publish-playstore-beta ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    name: Bump Version Code & Name
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate and Update Version
        run: |
          GRADLE_FILE="app/build.gradle.kts"

          CURRENT_CODE=$(grep -E 'versionCode\s*=\s*[0-9]+' "$GRADLE_FILE" | grep -oE '[0-9]+')
          CURRENT_NAME=$(grep -E 'versionName\s*=\s*"[^"]+"' "$GRADLE_FILE" | grep -oE '"[^"]+"' | tr -d '"')

          echo "Current Version Code: $CURRENT_CODE"
          echo "Current Version Name: $CURRENT_NAME"

          NEW_CODE=$((CURRENT_CODE + 1))

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="$MAJOR.$MINOR.$NEW_PATCH"

          echo "New Version Code: $NEW_CODE"
          echo "New Version Name: $NEW_NAME"

          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\1$NEW_CODE/" "$GRADLE_FILE"
          sed -i -E "s/(versionName\s*=\s*)[\"'][^\"']+[\"']/\1\"$NEW_NAME\"/" "$GRADLE_FILE"

          git add "$GRADLE_FILE"
          git commit -m "CI: Bump version to $NEW_NAME ($NEW_CODE) [skip ci]"
          git push origin master